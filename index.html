<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OBS PAS + FSA</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#545e28">
    <link rel="apple-touch-icon" href="icon-512.png">
    
    <style>
        :root {
            --slate-50: #f8fafc; --slate-100: #f1f5f9; --slate-200: #e2e8f0; --slate-300: #cbd5e1;
            --slate-900: #0f172a; --blue-50: #eff6ff; --red-600: #dc2626; --red-800: #991b1b;
            --green-100: #dcfce7; --green-600: #16a34a; --green-700: #15803d; --amber-50: #fffbeb;
            --brand-green: #545e28; --brand-green-hover: #464f21; --brand-green-dark: #3a421a;
            --brand-green-light: #e9ebd8; --brand-yellow: #e6b320; --brand-yellow-hover: #cfa11c;
        }
        *, *::before, *::after { box-sizing: border-box; }
        body { margin: 0; font-family: system-ui, -apple-system, sans-serif; background: var(--slate-100); color: var(--slate-900); padding-bottom: max(90px, env(safe-area-inset-bottom)); }
        input, textarea, button { font-family: inherit; }
        .custom-checkbox { width: 1.25rem; height: 1.25rem; accent-color: var(--brand-green); cursor: pointer; }
        .app-header { background: var(--brand-green); color: white; padding: 1rem; position: sticky; top: 0; z-index: 10; display: flex; justify-content: space-between; align-items: center; }
        .app-main { max-width: 42rem; margin: 0 auto; padding: 1rem; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .section-header { border-bottom: 2px solid var(--brand-green); margin-bottom: 1rem; padding-bottom: 0.5rem; text-transform: uppercase; font-weight: 900; }
        .card { background: white; padding: 1rem; border-radius: 0.5rem; border: 1px solid var(--slate-200); margin-bottom: 1rem; }
        .input { width: 100%; padding: 0.5rem; background: var(--slate-50); border: 1px solid var(--slate-200); border-radius: 0.25rem; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
        .scene-item { display: flex; align-items: center; gap: 1rem; padding: 0.75rem; background: white; border: 1px solid var(--slate-200); border-radius: 0.5rem; margin-bottom: 0.5rem; }
        .alert-critical { background: var(--red-600); color: white; padding: 1rem; border-radius: 0.5rem; border-left: 8px solid var(--red-800); margin-bottom: 1rem; }
        .btn-full { width: 100%; padding: 0.75rem; border-radius: 0.5rem; border: none; font-weight: 700; color: white; cursor: pointer; }
        .btn-brand { background: var(--brand-green); }
        .btn-bad { background: var(--red-600); }
        .btn-slate { background: var(--slate-800); }
        .log-container { background: var(--slate-100); border-radius: 0.5rem; overflow: hidden; }
        .log-entry { padding: 0.75rem; border-bottom: 1px solid var(--slate-200); font-size: 0.875rem; }
        .report-display { font-family: monospace; font-size: 0.875rem; padding: 0.75rem; background: rgba(0,0,0,0.05); white-space: pre-wrap; }
        .fsa-wrapper { max-width: 36rem; margin: 0 auto; }
        .fsa-progress { display: flex; height: 0.75rem; background: var(--slate-200); border-radius: 999px; overflow: hidden; margin-bottom: 1rem; }
        .fsa-bar { flex: 1; transition: background-color 0.3s; }
        .fsa-bar.active { background: var(--brand-green); }
        .fsa-card { background: white; padding: 1.5rem; border-radius: 1rem; border: 2px solid var(--slate-200); }
        .fsa-bullet-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem; background: var(--slate-50); border-radius: 0.5rem; margin-bottom: 0.5rem; border-left: 4px solid var(--brand-green); }
        .fsa-btn { width: 100%; padding: 1rem; border-radius: 0.75rem; border: 2px solid var(--brand-green); font-weight: 900; margin-bottom: 0.5rem; cursor: pointer; }
        .fsa-btn-primary { background: var(--brand-green); color: white; }
        .fsa-btn-secondary { background: var(--slate-50); color: var(--slate-900); }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; border-top: 1px solid var(--slate-200); z-index: 20; }
        .nav-container { display: flex; justify-content: space-around; max-width: 42rem; margin: 0 auto; }
        .nav-btn { padding: 0.75rem; border: none; background: transparent; display: flex; flex-direction: column; align-items: center; color: var(--slate-400); }
        .nav-btn.active { color: var(--brand-green); }
    </style>
</head>
<body>

    <div class="app-header">
        <div class="header-title flex items-center gap-3">
            <img src="icon-512.png" alt="OBS Logo" style="width: 2.5rem; height: 2.5rem; object-fit: contain; border-radius: 4px;">
            <h1>OBS PAS + FSA</h1>
        </div>
        <select id="patient-selector" onchange="App.switchPatient(this.value)" style="padding: 0.375rem; border-radius: 0.25rem; border: none;"></select>
        <button onclick="App.createNewPatient()" class="btn-reset">➕ New</button>
    </div>

    <div class="app-main">
        <div id="tab-action" class="tab-content active space-y-6">
            <div class="section-header"><h2>Scene Size-Up</h2></div>
            <div id="scene-container"></div>
            <div class="section-header"><h2>Primary (ABCDE)</h2></div>
            <div id="primary-alert"></div>
            <div id="primary-container"></div>
            <div class="section-header"><h2>Head to Toe</h2></div>
            <div id="htt-container"></div>
        </div>

        <div id="tab-data" class="tab-content space-y-6">
            <div class="section-header"><h2>Patient Details</h2></div>
            <div class="card card-p4">
                <input type="text" id="det-name" placeholder="Name" class="input mb-2" oninput="App.updateData('details', 'name', this.value)">
                <div class="grid-2 gap-2 mb-2">
                    <input type="text" id="det-sex" placeholder="Sex" class="input" oninput="App.updateData('details', 'sex', this.value)">
                    <input type="text" id="det-age" placeholder="Age" class="input" oninput="App.updateData('details', 'age', this.value)">
                </div>
                <input type="text" id="det-loc" placeholder="Location" class="input" oninput="App.updateData('details', 'loc', this.value)">
            </div>
            <div class="section-header"><h2>Vitals</h2></div>
            <div class="card card-p4">
                <div id="vitals-inputs" class="space-y-4 mb-4"></div>
                <button onclick="App.logVitals()" class="btn-full btn-brand mb-4">Log Vitals</button>
                <div id="vitals-log-container"></div>
            </div>
            <div class="section-header"><h2>Pain (OPQRST)</h2></div>
            <div class="card card-p4" id="opqrst-container"></div>
            <div class="section-header"><h2>History</h2></div>
            <div class="card card-p4" id="sample-container"></div>
            <div class="section-header"><h2>Summary</h2></div>
            <div class="card card-p4" id="summary-container"></div>
        </div>

        <div id="tab-report" class="tab-content space-y-6">
            <div class="card report-ops">
                <div class="report-header"><h2>📻 Ops Room Brief</h2></div>
                <div id="ops-brief-display" class="report-display"></div>
            </div>
            <div class="card report-med">
                <div class="report-header"><h2>⚕️ Medical Report</h2></div>
                <pre id="handover-display" class="report-display"></pre>
                <div class="grid-2 gap-2">
                    <button onclick="App.copyReport('handover')" class="btn-full btn-brand">Copy</button>
                    <button onclick="App.downloadReport()" class="btn-full btn-slate">Save .txt</button>
                </div>
            </div>
            <button onclick="App.deleteAllData()" class="btn-full btn-bad">CLEAR ALL DATA</button>
        </div>

        <div id="tab-fsa" class="tab-content"><div id="fsa-wizard-container" class="fsa-wrapper"></div></div>
    </div>

    <div class="bottom-nav">
        <div class="nav-container" id="nav-container"></div>
    </div>

    <script>
        const App = {
            activeTab: 'action', fsaStep: 0, patients: [], currentPatientIndex: 0,
            get data() { return this.patients[this.currentPatientIndex]; },
            primaryGroups: [
                { title: 'A - Airway', checks: [{ k: 'a', goodLabel: 'Clear', badLabel: 'Obstructed' }] },
                { title: 'B - Breathing', checks: [{ k: 'b', goodLabel: 'Normal', badLabel: 'Distressed/Stopped' }] },
                { title: 'C - Circulation', checks: [{ k: 'c_bleed', label: 'Major Bleeding', goodLabel: 'Controlled/None', badLabel: 'Active Bleed' }, { k: 'c_sweep', label: 'Blood Sweep', goodLabel: 'No Bleeding', badLabel: 'Bleeding' }, { k: 'c_pulse', label: 'Radial Pulse', goodLabel: 'Pulse Present', badLabel: 'Weak/No Pulse' }]},
                { title: 'D - Decision (Spine)', checks: [{ k: 'd', goodLabel: 'Cleared', badLabel: 'Immobilized' }] },
                { title: 'E - Expose', checks: [{ k: 'e', goodLabel: 'No Wounds', badLabel: 'Wounds Found' }] }
            ],
            bodyParts: ["Head", "Neck", "Shoulder (L/R)", "Chest", "Abdomen", "Pelvis", "Groin", "Arm + Hand (R)", "Arm + Hand (L)", "Leg + Foot (R)", "Leg + Foot (L)", "Spine", "Upper Back", "Lower Back"],
            vitalsConfig: [{ id: 'lor', label: 'LOR' }, { id: 'hr', label: 'HR' }, { id: 'rr', label: 'RR' }, { id: 'temp', label: 'Temp' }, { id: 'skin', label: 'Skin' }, { id: 'pupils', label: 'Pupils' }],
            opqrstMap: [{ k: 'o', l: 'Onset' }, { k: 'p', l: 'Provoking' }, { k: 'q', l: 'Quality' }, { k: 'r', l: 'Region' }, { k: 's', l: 'Severity' }, { k: 't', l: 'Timing' }],
            sampleMap: { symptoms: 'Symptoms', allergies: 'Allergies', meds: 'Meds', past: 'Hx', last: 'Last Intake', events: 'Events' },
            fsaStepsConfig: [
                { title: 'PAS', question: 'Patient Assessment (PAS) completed?', options: [{ label: 'Yes', icon: '✅', next: 1 }, { label: 'No', icon: '⛔', action: 'complete_pas' }] },
                { title: 'MOI', question: 'Is there a Positive MOI?', detailedList: [{ icon: "🧠", text: "Altered consciousness" }, { icon: "⚡", text: "High velocity" }, { icon: "⬇️", text: "Fall >1m" }], options: [{ label: 'Yes', icon: '✅', next: 2 }, { label: 'No', icon: '⛔', action: 'no_fsa_needed' }] },
                { title: 'Reliability', question: 'Is the patient reliable?', bullets: ['A+O x 3/4', 'Sober', 'No Distracting Injury'], options: [{ label: 'Yes', icon: '✅', next: 3 }, { label: 'No', icon: '⛔', action: 'treat_spinal' }] },
                { title: 'Physical (CSM)', question: 'Full CSM on all 4 limbs?', description: 'Check Circ, Sens, Mot.', options: [{ label: 'Yes', icon: '✅', next: 4 }, { label: 'No', icon: '⛔', action: 'treat_spinal' }] },
                { title: 'Palpation', question: 'No pain on palpation?', description: 'Press spine.', options: [{ label: 'No Pain', icon: '✅', action: 'release' }, { label: 'Pain', icon: '⛔', action: 'treat_spinal' }] }
            ],
            init() { this.loadData(); this.renderNav(); this.updateAllUI(); },
            getBlankPatient() { return { id: Date.now(), details: { name: '', sex: '', age: '', loc: '' }, scene: { '1': false, '2': false, moiDesc: '', '3': false, '4': false, '5': false, consent: false, cspine: false, complaint: false, complaintDesc: '' }, primary: { a: 'unchecked', b: 'unchecked', c_bleed: 'unchecked', c_sweep: 'unchecked', c_pulse: 'unchecked', d: 'unchecked', e: 'unchecked' }, injuries: {}, httChecks: {}, vitals: { lor: '', hr: '', rr: '', skin: '', pupils: '', temp: '' }, vitalsLog: [], opqrstDraft: { id: null, location: '', o: '', p: '', q: '', r: '', s: '', t: '' }, opqrstLog: [], history: { symptoms: '', allergies: '', meds: '', past: '', last: '', events: '' }, summary: { treatment: '', problems: '', reqs: '' } }; },
            loadData() { try { const saved = localStorage.getItem('obs_vanilla_data_v2'); this.patients = saved ? JSON.parse(saved) : [this.getBlankPatient()]; if(this.patients.length === 0) this.patients.push(this.getBlankPatient()); } catch(e) { this.patients = [this.getBlankPatient()]; } },
            saveData() { try { localStorage.setItem('obs_vanilla_data_v2', JSON.stringify(this.patients)); } catch(e) {} },
            createNewPatient() { this.patients.push(this.getBlankPatient()); this.currentPatientIndex = this.patients.length - 1; this.fsaStep = 0; this.saveData(); this.updateAllUI(); },
            switchPatient(index) { this.currentPatientIndex = parseInt(index); this.fsaStep = 0; this.updateAllUI(); },
            deleteAllData() { if(confirm("CLEAR ALL SYSTEM DATA?")) { localStorage.removeItem('obs_vanilla_data_v2'); window.scrollTo(0,0); window.location.reload(); } },
            updateData(cat, field, val) { this.data[cat][field] = val; this.saveData(); if(cat === 'scene' && ['1','2','3','4','5','consent','cspine','complaint'].includes(field)) this.renderScene(); if(cat === 'details' && field === 'name') this.renderPatientSelector(); },
            switchTab(tabId) { this.activeTab = tabId; document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active')); document.getElementById(`tab-${tabId}`).classList.add('active'); if(tabId === 'data') this.renderSummary(); if(tabId === 'report') this.renderReports(); if(tabId === 'fsa') this.renderFSA(); this.renderNav(); window.scrollTo(0, 0); },
            renderNav() { const tabs = [{ id: 'action', icon: '🛡️', label: 'Action' }, { id: 'data', icon: '🗄️', label: 'Data' }, { id: 'report', icon: '📻', label: 'Reports' }, { id: 'fsa', icon: '🦴', label: 'FSA' }]; const container = document.getElementById('nav-container'); container.innerHTML = tabs.map(t => `<button onclick="App.switchTab('${t.id}')" class="nav-btn ${this.activeTab === t.id ? 'active' : ''}"><div class="nav-icon">${t.icon}</div><span class="nav-label">${t.label}</span></button>`).join(''); },
            updateAllUI() { this.renderPatientSelector(); document.getElementById('det-name').value = this.data.details.name; document.getElementById('det-loc').value = this.data.details.loc; document.getElementById('det-sex').value = this.data.details.sex; document.getElementById('det-age').value = this.data.details.age; this.renderScene(); this.renderPrimary(); document.getElementById('htt-container').innerHTML = this.bodyParts.map(p => `<div class="card"><div class="flex items-center gap-3 mb-2"><input type="checkbox" class="custom-checkbox" onchange="App.data.httChecks['${p}'] = this.checked; App.saveData()" ${this.data.httChecks[p] ? 'checked' : ''}><label class="font-bold">${p}</label></div><input type="text" class="input" value="${this.data.injuries[p] || ''}" oninput="App.setInjury('${p}', this.value)"></div>`).join(''); document.getElementById('vitals-inputs').innerHTML = this.vitalsConfig.map(v => `<div><label class="input-label">${v.label}</label><input type="text" class="input" value="${this.data.vitals[v.id]}" oninput="App.updateData('vitals', '${v.id}', this.value)"></div>`).join(''); this.renderOpqrst(); document.getElementById('sample-container').innerHTML = Object.entries(this.sampleMap).map(([k, l]) => `<div><label class="input-label">${l}</label><input type="text" class="input" value="${this.data.history[k]}" oninput="App.updateData('history', '${k}', this.value)"></div>`).join(''); this.renderVitalsLog(); this.renderSummary(); if(this.activeTab === 'report') this.renderReports(); if(this.activeTab === 'fsa') this.renderFSA(); },
            renderPatientSelector() { const s = document.getElementById('patient-selector'); if(s) s.innerHTML = this.patients.map((p, i) => `<option value="${i}" ${i === this.currentPatientIndex ? 'selected' : ''}>${p.details.name || 'Casualty ' + (i+1)}</option>`).join(''); },
            renderOpqrst() { const d = this.data; let html = `<div class="mb-4"><label class="input-label">Injury Location</label><input type="text" class="input" value="${d.opqrstDraft.location}" oninput="App.updateOpqrstDraft('location', this.value)"></div><div class="grid-2 gap-2 mb-4">${this.opqrstMap.map(i => `<div><label class="input-label">${i.l}</label><input type="text" class="input" value="${d.opqrstDraft[i.k]}" oninput="App.updateOpqrstDraft('${i.k}', this.value)"></div>`).join('')}</div><button onclick="App.saveOpqrstLog()" class="btn-full btn-brand mb-2">${d.opqrstDraft.id ? '💾 Update' : '➕ Log Info'}</button>${d.opqrstLog.length ? `<div class="log-container mt-6"><div class="log-header"><span>Pain Logs</span></div><div class="log-list">${d.opqrstLog.map(l => `<div class="log-entry"><div class="flex justify-between mb-1"><strong>[${l.location}]</strong><div class="flex gap-2"><button onclick="App.editOpqrst(${l.id})" class="btn-reset">✏️</button><button onclick="App.deleteOpqrst(${l.id})" class="btn-reset">🗑️</button></div></div><div class="log-data">${this.opqrstMap.map(m => `<span><strong>${m.l.charAt(0)}:</strong> ${l[m.k]||'-'}</span>`).join('')}</div></div>`).join('')}</div></div>` : ''}`; document.getElementById('opqrst-container').innerHTML = html; },
            updateOpqrstDraft(f, v) { this.data.opqrstDraft[f] = v; this.saveData(); },
            saveOpqrstLog() { const d = this.data; if(d.opqrstDraft.id) { const idx = d.opqrstLog.findIndex(l => l.id === d.opqrstDraft.id); if(idx > -1) d.opqrstLog[idx] = {...d.opqrstDraft}; } else d.opqrstLog.push({...d.opqrstDraft, id: Date.now()}); d.opqrstDraft = {id:null, location:'', o:'', p:'', q:'', r:'', s:'', t:''}; this.saveData(); this.renderOpqrst(); },
            editOpqrst(id) { this.data.opqrstDraft = {...this.data.opqrstLog.find(l => l.id === id)}; this.saveData(); this.renderOpqrst(); },
            deleteOpqrst(id) { if(confirm("Delete?")) { this.data.opqrstLog = this.data.opqrstLog.filter(l => l.id !== id); this.saveData(); this.renderOpqrst(); } },
            renderScene() { const s = this.data.scene; const toggleHtml = (id, label, field) => `<label class="scene-item"><input type="checkbox" class="custom-checkbox" onchange="App.updateData('scene', '${field}', this.checked)" ${s[field]?'checked':''}><span class="scene-label ${s[field]?'checked':''}">${id}. ${label}</span></label>`; document.getElementById('scene-container').innerHTML = `${toggleHtml(1, 'I am No. 1.', '1')}<div class="card mb-2"><label class="flex items-center gap-3 ${s['2'] ? 'mb-2' : ''} cursor-pointer"><input type="checkbox" class="custom-checkbox" onchange="App.updateData('scene', '2', this.checked)" ${s['2']?'checked':''}><span>2. MOI</span></label>${s['2']?`<input type="text" class="input" value="${s.moiDesc}" oninput="App.updateData('scene', 'moiDesc', this.value)">`:''}</div>${toggleHtml(3, 'PPE', '3')}${toggleHtml(4, 'Casualties', '4')}${toggleHtml(5, 'Status', '5')}<div class="critical-box"><h3 class="critical-title">Critical 3Cs</h3><label class="critical-row"><input type="checkbox" class="custom-checkbox" onchange="App.updateData('scene', 'consent', this.checked)" ${s.consent?'checked':''}>Consent</label><label class="critical-row"><input type="checkbox" class="custom-checkbox" onchange="App.updateData('scene', 'cspine', this.checked)" ${s.cspine?'checked':''}>C-Spine</label><div><label class="critical-row ${s.complaint?'mb-2':''}"><input type="checkbox" class="custom-checkbox" onchange="App.updateData('scene', 'complaint', this.checked)" ${s.complaint?'checked':''}>Complaint</label>${s.complaint?`<input type="text" class="input" value="${s.complaintDesc}" oninput="App.updateData('scene', 'complaintDesc', this.value)">`:''}</div></div>`; },
            setPrimaryStatus(key, status) { this.updateData('primary', key, status); this.renderPrimary(); if(status === 'bad') window.scrollTo({top: 0, behavior: 'smooth'}); },
            renderPrimary() { const hasFailure = Object.values(this.data.primary).includes('bad'); document.getElementById('primary-alert').innerHTML = hasFailure ? `<div class="alert-critical"><span>⚠️</span><div><h3 class="font-black uppercase">Critical Issue!</h3><p>Stop and fix!</p></div></div>` : ''; document.getElementById('primary-container').innerHTML = this.primaryGroups.map(group => `<div class="card"><div class="primary-header"><span class="primary-title">${group.title}</span></div><div class="grid-2 gap-3 mt-1">${group.checks.map(c => `<div class="space-y-1"><div class="input-label">${c.label||''}</div><div class="grid-2 gap-3"><button onclick="App.setPrimaryStatus('${c.k}', 'good')" class="status-btn ${this.data.primary[c.k]==='good'?'btn-good':'btn-inactive'}">${c.goodLabel}</button><button onclick="App.setPrimaryStatus('${c.k}', 'bad')" class="status-btn ${this.data.primary[c.k]==='bad'?'btn-bad':'btn-inactive'}">${c.badLabel}</button></div></div>`).join('')}</div></div>`).join(''); },
            setInjury(part, val) { this.data.injuries[part] = val; this.saveData(); },
            logVitals() { const n = new Date(); const ts = n.getHours().toString().padStart(2, '0') + ':' + n.getMinutes().toString().padStart(2, '0'); this.data.vitalsLog.unshift({ timestamp: ts, data: {...this.data.vitals} }); this.saveData(); this.renderVitalsLog(); },
            renderVitalsLog() { const logDiv = document.getElementById('vitals-log-container'); if(this.data.vitalsLog.length) logDiv.innerHTML = `<div class="log-container mt-4"><div class="log-header"><span>Log (${this.data.vitalsLog.length})</span></div><div class="log-list">${this.data.vitalsLog.map(e => `<div class="log-entry"><strong>[${e.timestamp}]</strong><div class="log-data">${Object.entries(e.data).map(([k,v])=>`<span>${k.toUpperCase()}: ${v||'-'}</span>`).join('')}</div></div>`).join('')}</div></div>`; },
            renderSummary() { const d = this.data; document.getElementById('summary-container').innerHTML = `<div><label class="input-label">Chief Complaint</label><div class="input italic opacity-70 mb-4">${d.scene.complaintDesc || 'None'}</div></div><div><label class="input-label">MOI</label><div class="input italic opacity-70 mb-4">${d.scene.moiDesc || 'None'}</div></div><div><label class="input-label">Injuries</label><div class="input italic opacity-70 mb-4">${Object.entries(d.injuries).map(([k,v]) => `${k}: ${v}`).join('<br>') || 'None'}</div></div><div class="mb-4"><label class="input-label">Treatment</label><textarea rows="3" class="input" oninput="App.updateData('summary', 'treatment', this.value)">${d.summary.treatment}</textarea></div><div class="mb-4"><label class="input-label">Problems</label><textarea rows="3" class="input" oninput="App.updateData('summary', 'problems', this.value)">${d.summary.problems}</textarea></div><div><label class="input-label">Requests</label><textarea rows="2" class="input" oninput="App.updateData('summary', 'reqs', this.value)">${d.summary.reqs}</textarea></div>`; },
            generateReportsText() { const d = this.data; const moi = d.scene.moiDesc || (d.scene['2']?'Logged':'Unknown'); const inj = Object.entries(d.injuries); const vitals = d.vitalsLog.length ? [...d.vitalsLog].reverse().map(e => `[${e.timestamp}] LOR:${e.data.lor} HR:${e.data.hr} RR:${e.data.rr}`).join('\n') : "No vitals"; const pain = d.opqrstLog.map(l => `[${l.location}] O:${l.o} P:${l.p} Q:${l.q} R:${l.r} S:${l.s} T:${l.t}`).join('\n'); return { opsHtml: `<div class="mb-4"><span>Ops Room, this is [Name]. I have a casualty. Standby.</span></div><div class="mb-4"><span class="font-bold">Details:</span><div class="border-left-yellow text-yellow">${d.details.name||'Unknown'}, Loc:${d.details.loc||'?'}</div></div><div class="mb-4"><span class="font-bold">MOI:</span><div class="border-left-yellow text-yellow">${moi}<br>C.C.: ${d.scene.complaintDesc||'None'}</div></div><div class="mb-4"><span class="font-bold">Injuries:</span><div class="border-left-yellow text-yellow">${inj.map(([k,v])=>`<div>${k}: ${v}</div>`).join('')||'None'}</div></div><div class="mb-4"><span class="font-bold">Signs:</span><div class="border-left-yellow text-yellow">LOR ${d.vitals.lor||'-'}, HR ${d.vitals.hr||'-'}</div></div><div class="mb-4"><span class="font-bold">Tx:</span><div class="border-left-yellow text-yellow whitespace-pre-wrap">${d.summary.treatment||'None'}</div></div><div class="mb-4"><span class="font-bold">Reqs:</span><div class="border-left-yellow text-yellow whitespace-pre-wrap">${d.summary.reqs||'None'}</div></div><div>Over.</div>`, fullHandover: `Name: ${d.details.name||'Unknown'}\nLoc: ${d.details.loc||'Unknown'}\nMOI: ${moi}\nC.C.: ${d.scene.complaintDesc||'None'}\n\nINJURIES:\n${inj.map(([k,v]) => `- ${k}: ${v}`).join('\n')}\n\nVITALS:\n${vitals}\n\nPAIN:\n${pain}\n\nTX:\n${d.summary.treatment||'None'}\n\nREQ:\n${d.summary.reqs||'None'}` }; },
            renderReports() { const { opsHtml, fullHandover } = this.generateReportsText(); document.getElementById('ops-brief-display').innerHTML = opsHtml; document.getElementById('handover-display').textContent = fullHandover; this.handoverData = fullHandover; },
            copyReport(t) { navigator.clipboard.writeText(this.handoverData).then(() => alert("Copied!")); },
            downloadReport() { const b = new Blob([this.handoverData], {type: 'text/plain'}); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = `Report_${this.data.details.name||'Casualty'}.txt`; a.click(); },
            renderFSA() { const container = document.getElementById('fsa-wizard-container'); const cur = this.fsaStepsConfig[this.fsaStep]; container.innerHTML = `<div class="section-header"><h2>Spinal Assessment</h2></div><div class="fsa-progress">${this.fsaStepsConfig.map((_, i) => `<div class="fsa-bar ${i <= this.fsaStep ? 'active' : ''}"></div>`).join('')}</div><div class="fsa-card"><div><h3 class="fsa-step-info">Step ${this.fsaStep + 1}</h3><h2 class="fsa-question">${cur.question}</h2>${cur.description?`<p class="fsa-desc">${cur.description}</p>`:''}${cur.detailedList?`<div class="fsa-bullet-list">${cur.detailedList.map(i=>`<div class="fsa-bullet-item"><span>${i.icon}</span><span>${i.text}</span></div>`).join('')}</div>`:''}${cur.bullets?`<div class="fsa-bullet-list">${cur.bullets.map(b=>`<div class="fsa-bullet-item">${b}</div>`).join('')}</div>`:''}</div><div class="fsa-btn-group">${cur.options.map((o, i) => `<button onclick="App.setFSAStep(${typeof o.next!=='undefined'?o.next:`'${o.action}'`})" class="fsa-btn ${i===0?'fsa-btn-primary':'fsa-btn-secondary'}"><span>${o.label}</span><span>${o.icon}</span></button>`).join('')}</div></div>`; }
        };
        window.onload = () => App.init();
    </script>
<script>
    if ('serviceWorker' in navigator) { window.addEventListener('load', () => navigator.serviceWorker.register('sw.js')); }
</script>
</body>
</html>
